windowrule = match:class steam.*, tag -default-opacity
windowrule = match:class steam.*, opacity 1 1
windowrule = match:class steam, float on
windowrule = match:class steam, center on
windowrule = match:class steam, idle_inhibit fullscreen
windowrule = match:class steam, size 1000 650, match:title Steam
windowrule = match:class steam, size 450 650, match:title Friends List
