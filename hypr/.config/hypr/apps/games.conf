# Game-specific window rules for native/Proton games on ultrawide
windowrule = match:class (dontstarve_steam|Brotato.x86_64), float on
windowrule = match:class (dontstarve_steam|Brotato.x86_64), center on
windowrule = match:class (dontstarve_steam|Brotato.x86_64), size 1280 720
windowrule = match:class (dontstarve_steam|Brotato.x86_64), keep_aspect_ratio on
windowrule = match:class (dontstarve_steam|Brotato.x86_64), idle_inhibit fullscreen
windowrule = match:class (dontstarve_steam|Brotato.x86_64), tag -default-opacity
windowrule = match:class (dontstarve_steam|Brotato.x86_64), opacity 1 1
