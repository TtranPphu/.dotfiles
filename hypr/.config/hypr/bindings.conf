# Application bindings
# bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
# bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT ALT, M, Music TUI, exec, omarchy-launch-or-focus-tui cliamp
# bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian"
# bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
# bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
# bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
# bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
# bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
# bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
# bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
# bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
# bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# Logitech MX Keys
# bind = SUPER SHIFT, S, exec, omarchy-cmd-screenshot          # Print Screen Button
# bind = SUPER, H, exec, voxtype record toggle                 # Dictation Button
# bind = SUPER, PERIOD, exec, omarchy-launch-walker -m symbols # Emoji Button

unbind = SUPER, SPACE
unbind = SUPER ALT, SPACE
unbind = SUPER CTRL, BACKSPACE
bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# Monitor scaling cycle (replaces Omarchy default with custom scales: 1.6, 2, 3)
unbind = SUPER, code:61
unbind = SUPER ALT, code:61
bindd = SUPER, code:61, Cycle monitor scaling, exec, ~/.config/hypr/scripts/monitor-scaling-cycle.sh
bindd = SUPER ALT, code:61, Cycle monitor scaling backwards, exec, ~/.config/hypr/scripts/monitor-scaling-cycle.sh --reverse

# Directional focus movement with WASD/HJKL (replaces arrow keys)
unbind = SUPER, LEFT
unbind = SUPER, RIGHT
unbind = SUPER, UP
unbind = SUPER, DOWN
unbind = SUPER SHIFT, LEFT
unbind = SUPER SHIFT, RIGHT
unbind = SUPER SHIFT, UP
unbind = SUPER SHIFT, DOWN

bindd = SUPER, W, Focus on above window, movefocus, u
bindd = SUPER, A, Focus on left window, movefocus, l
bindd = SUPER, S, Focus on below window, movefocus, d
bindd = SUPER, D, Focus on right window, movefocus, r
bindd = SUPER, H, Focus on left window, movefocus, l
bindd = SUPER, J, Focus on below window, movefocus, d
bindd = SUPER, K, Focus on above window, movefocus, u
bindd = SUPER, L, Focus on right window, movefocus, r

bindd = SUPER SHIFT, W, Swap window up, swapwindow, u
bindd = SUPER SHIFT, A, Swap window left, swapwindow, l
bindd = SUPER SHIFT, S, Swap window down, swapwindow, d
bindd = SUPER SHIFT, D, Swap window right, swapwindow, r
bindd = SUPER SHIFT, H, Swap window left, swapwindow, l
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, L, Swap window right, swapwindow, r

# Displaced: Close window (was SUPER+SHIFT+W, now SUPER+Q)
bindd = SUPER, Q, Close window, killactive,

# Displaced: Show key bindings (was SUPER+K, now SUPER+SHIFT+SLASH / ?)
bindd = SUPER SHIFT, SLASH, Show key bindings, exec, omarchy-menu-keybindings

# Displaced: Toggle window split (was SUPER+J, now SUPER+SEMICOLON / ;)
bindd = SUPER, SEMICOLON, Toggle window split, layoutmsg, togglesplit

# Displaced: Toggle workspace layout (was SUPER+L, now SUPER+BACKSLASH / \)
bindd = SUPER, BACKSLASH, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle

unbind = SUPER CTRL, Delete
bindd = SUPER CTRL, Delete, Toggle internal display, exec, uwsm-app -- xdg-terminal-exec bash -c "bash ~/.config/hypr/scripts/toggle-internal-display.sh"

bindd = SUPER SHIFT, F, File manager, exec, omarchy-launch-or-focus-tui yazi
bindd = SUPER SHIFT, T, Terminal, exec, omarchy-launch-or-focus ghostty
bindd = SUPER SHIFT, E, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, N, Neo Vim, exec, uwsm-app -- xdg-terminal-exec nvim
bindd = SUPER SHIFT, C, VS Code, exec, uwsm-app -- code
bindd = SUPER SHIFT, G, GitHub, exec, omarchy-launch-webapp "https://github.com/TtranPphu"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT, M, Music, exec, uwsm-app -- Telegram
# bindd = SUPER SHIFT, S, Steam, exec, uwsm-app -- steam
