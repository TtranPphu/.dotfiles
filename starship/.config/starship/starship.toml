# version: 1.0.0
"$schema" = "https://starship.rs/config-schema.json"

# palette = "tokio-night"
add_newline = true

format = """
$os\
$shell\
$directory\
${custom.git_remote}\
$git_branch\
$git_status\
$fill\
$c\
$java\
$kotlin\
$lua\
$python\
$rust\
$cmd_duration\
${custom.clock}\
${custom.battery_high}\
${custom.battery_mid}\
${custom.battery_low}\
$line_break\
$character\
"""

right_format = """
$username\
$hostname\
${custom.docker_host}\
"""


[shell]
disabled = false
style = "bold bright-black"
format = "with [$indicator]($style) "
unknown_indicator = "unknown-shell"
bash_indicator = "оҜҠ bash"
cmd_indicator = "оҜ„ cmd"
fish_indicator = "у°Ҳә fish"
nu_indicator = "оӘ… nu"
powershell_indicator = "оҜҮ powershell"
zsh_indicator = "п’ү zsh"

[os]
disabled = false
style = "bold"
format = "[$symbol]($style)  "

[os.symbols]
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
CentOS = "пҢ„"
Debian = "у°Јҡ"
Fedora = "у°Јӣ"
Gentoo = "у°ЈЁ"
Linux = "у°ҢҪ"
Macos = "у°Җө"
Manjaro = "пҢ’"
Mint = "у°Јӯ"
NixOS = "пҢ“ "
Raspbian = "у°җҝ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"
RockyLinux = "пҢ« "
SUSE = "пҢ”"
Ubuntu = "пҢӣ"
Windows = "оңҸ"

[directory]
style = "bold bright-blue"
format = "in [$path]($style) "
truncation_length = 7
truncation_symbol = "вҖҰ/"
truncate_to_repo = false
read_only = "у°үҗ "


[git_branch]
symbol = ""
style = "green"
format = "[$branch]($style) "

[custom.git_remote]
command = """
remote=$(git remote get-url origin 2>/dev/null);
case "$remote" in
  *github*)
    echo "п„“"
    ;;
  *gitlab*)
    echo "пҠ–"
    ;;
  *bitbucket*)
    echo "п…ұ"
    ;;
  *)
    echo "у°Ҡў"
    ;;
esac
"""
shell = ["bash"]
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
style = "bold white"
format = "[on $output]($style) "

[git_status]
style = "bright-yellow"
format = "[$all_status$ahead_behind]($style)"
ahead = "вҶ‘${count} "
behind = "вҶ“${count} "
diverged = "вҶ‘${ahead_count} вҶ“${behind_count} "
conflicted = "~${count} "
deleted = "вң—${count} "
renamed = "вҶ’${count} "
modified = "!${count} "
staged = "вң“${count} "
stashed = "вүЎ${count} "
untracked = "?${count} "


[fill]
symbol = "В·"
style = "dimmed bright-black"


[c]
symbol = "оҳһ "
format = " [$symbol($version)]($style)"
detect_files = ["CMakeLists.txt"]
detect_extensions = ["c", "h", "cpp", "hpp"]

[java]
symbol = "у°¬· "
format = " [$symbol($version)]($style)"

[kotlin]
symbol = "уұҲҷ "
format = " [$symbol($version)]($style)"

[lua]
symbol = "у°ўұ "
format = " [$symbol($version)]($style)"

[python]
symbol = "у°Ң  "
format = " [$symbol($version)($virtualenv)]($style)"

[rust]
symbol = "уұҳ— "
format = " [$symbol($version)]($style)"

[cmd_duration]
min_time = 1000
format = " took [$duration]($style)"
style = "yellow"


[time]
disabled = true

[custom.clock]
command = """
icons=("" "оҺӮ" "оҺғ" "оҺ„" "оҺ…" "оҺҶ" "оҺҮ" "оҺҲ" "оҺү" "оҺҠ" "оҺӢ" "оҺҢ" "оҺҒ")
echo "${icons[$(date +%-I)]} $(date +'%I:%M %p')"
"""
when = "true"
shell = ["bash"]
style = "dimmed bright-cyan"
format = " at [$output]($style)"


[battery]
disabled = true

[custom.battery_high]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/status.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/high.sh'
shell = ["bash"]
style = "bold green"
format = " [$output]($style)"

[custom.battery_mid]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/status.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/mid.sh'
shell = ["bash"]
style = "bold yellow"
format = " [$output]($style)"

[custom.battery_low]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/status.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/low.sh'
shell = ["bash"]
style = "bold red"
format = " [$output]($style)"


[character]
success_symbol = "[п„…](bold green)"
error_symbol = "[пҖҚ](bold red)"


[username]
show_always = true
style_user = "bold cyan"
style_root = "bold purple"
format = "as [$user]($style)"

[hostname]
format = " on [у°ў№ $hostname]($style)"


[custom.docker_host]
command = 'echo "${CONTAINER_NAME:-${COMPOSE_SERVICE}}"'
when = "test -f /.dockerenv"
shell = ["bash"]
style = "bold dimmed green"
format = " on [у°ЎЁ $output]($style)"


