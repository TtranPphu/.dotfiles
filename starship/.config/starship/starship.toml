# version: 1.0.0
"$schema" = "https://starship.rs/config-schema.json"

# palette = "tokio-night"
add_newline = true

format = """
${custom.llm_os}\
${custom.llm_pro}\
${custom.llm_flash}\
${custom.llm_reasoner}\
${custom.llm_chat}\
$shell\
${custom.compress_path}\
${custom.git_remote}\
$git_branch\
$git_status\
$fill\
$c\
$java\
$kotlin\
$lua\
$python\
$rust\
$cmd_duration\
${custom.date}\
${custom.clock}\
${custom.battery_high}\
${custom.battery_mid}\
${custom.battery_low}\
$line_break\
$character\
"""

right_format = """
${custom.deepseek_balance}\
$username\
$hostname\
${custom.docker_host}\
"""


[custom.llm_os]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/llm-route.sh os'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/llm-route-when.sh os'
shell = ["bash"]
style = "bold"
format = "[$output]($style)  "

[custom.llm_pro]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/llm-route.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/llm-route-when.sh claude-pro'
shell = ["bash"]
style = "red"
format = "[$output]($style)  "

[custom.llm_flash]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/llm-route.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/llm-route-when.sh claude-flash'
shell = ["bash"]
style = "purple"
format = "[$output]($style)  "

[custom.llm_reasoner]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/llm-route.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/llm-route-when.sh aichat-reasoner'
shell = ["bash"]
style = "blue"
format = "[$output]($style)  "

[custom.llm_chat]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/llm-route.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/llm-route-when.sh aichat-chat'
shell = ["bash"]
style = "cyan"
format = "[$output]($style)  "

[shell]
disabled = false
style = "bold bright-black"
format = "[$indicator]($style) "
unknown_indicator = "unknown-shell"
bash_indicator = "¯»è bash"
fish_indicator = "¾░ê║ fish"
nu_indicator = "¯¬à nu"
zsh_indicator = "´Æë zsh"

[custom.compress_path]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/compress-path.sh'
when = "true"
shell = ["bash"]
style = "bold bright-blue"
format = "[$output]($style) "

[git_branch]
symbol = ""
style = "green"
format = "[$branch]($style) "

[custom.git_remote]
command = """
remote=$(git remote get-url origin 2>/dev/null);
case "$remote" in
  *github*)
    echo "´äô"
    ;;
  *gitlab*)
    echo "´èû"
    ;;
  *bitbucket*)
    echo "´à▒"
    ;;
  *)
    echo "¾░èó"
    ;;
esac
"""
shell = ["bash"]
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
style = "bold white"
format = "[$output]($style) "

[git_status]
style = "bright-yellow"
format = "[$all_status$ahead_behind]($style)"
ahead = "Ôåæ${count} "
behind = "Ôåô${count} "
diverged = "Ôåæ${ahead_count} Ôåô${behind_count} "
conflicted = "~${count} "
deleted = "Ô£ù${count} "
renamed = "ÔåÆ${count} "
modified = "!${count} "
staged = "Ô£ô${count} "
stashed = "Ôëí${count} "
untracked = "?${count} "


[fill]
symbol = "┬À"
style = "dimmed bright-black"


[c]
symbol = "¯ÿ× "
format = " [$symbol($version)]($style)"
detect_files = ["CMakeLists.txt"]
detect_extensions = ["c", "h", "cpp", "hpp"]

[java]
symbol = "¾░¼À "
format = " [$symbol($version)]($style)"

[kotlin]
symbol = "¾▒êÖ "
format = " [$symbol($version)]($style)"

[lua]
symbol = "¾░ó▒ "
format = " [$symbol($version)]($style)"

[python]
symbol = "¾░îá "
format = " [$symbol($version)($virtualenv)]($style)"

[rust]
symbol = "¾▒ÿù "
format = " [$symbol($version)]($style)"


[cmd_duration]
min_time = 1000
format = " [¾░ªû $duration]($style)"
style = "yellow"

[time]
disabled = true

[custom.date]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/compress-date.sh'
when = "true"
shell = ["bash"]
style = "dimmed bright-cyan"
format = " [¾░â¡ $output]($style)"

[custom.clock]
command = """
icons=("" "¯Äé" "¯Äâ" "¯Ää" "¯Äà" "¯Äå" "¯Äç" "¯Äê" "¯Äë" "¯Äè" "¯Äï" "¯Äî" "¯Äü")
echo "${icons[$(date +%-I)]} $(date +'%I:%M %p')"
"""
when = "true"
shell = ["bash"]
style = "dimmed bright-cyan"
format = " [$output]($style)"

[battery]
disabled = true

[custom.battery_high]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/status.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/high.sh'
shell = ["bash"]
style = "bold green"
format = " [$output]($style)"

[custom.battery_mid]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/status.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/mid.sh'
shell = ["bash"]
style = "bold yellow"
format = " [$output]($style)"

[custom.battery_low]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/status.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/low.sh'
shell = ["bash"]
style = "bold red"
format = " [$output]($style)"


[character]
success_symbol = "[´äà](bold green)"
error_symbol = "[´Çì](bold red)"


[custom.deepseek_balance]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/deepseek-balance.sh'
when = 'test -z "${TMUX-}${ZELLIJ-}" && grep -q deepseek.com $HOME/.claude/settings.json 2>/dev/null'
shell = ["bash"]
style = "bright-blue"
format = " [¯ì░ $output]($style)"

[username]
show_always = true
style_user = "bold cyan"
style_root = "bold purple"
format = " [´Çç $user]($style)"

[hostname]
format = " [¾░ó╣ $hostname]($style)"


[custom.docker_host]
command = 'echo "${CONTAINER_NAME:-${COMPOSE_SERVICE}}"'
when = "test -f /.dockerenv"
shell = ["bash"]
style = "bold dimmed blue"
format = " [¾░í¿ $output]($style)"


