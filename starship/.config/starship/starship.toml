# version: 1.0.0
"$schema" = "https://starship.rs/config-schema.json"

# palette = "tokio-night"
add_newline = true

format = """
$os\
$shell\
$directory\
${custom.git_remote}\
$git_branch\
$git_status\
$fill\
$c\
$java\
$kotlin\
$lua\
$python\
$rust\
$cmd_duration\
${custom.clock}\
${custom.battery_high}\
${custom.battery_mid}\
${custom.battery_low}\
$line_break\
$character\
"""

right_format = """
${custom.deepseek_balance}\
$username\
$hostname\
${custom.docker_host}\
"""


[shell]
disabled = false
style = "bold bright-black"
format = "[$indicator]($style) "
unknown_indicator = "unknown-shell"
bash_indicator = "î¯ٹ bash"
cmd_indicator = "î¯„ cmd"
fish_indicator = "َ°ˆ؛ fish"
nu_indicator = "îھ… nu"
powershell_indicator = "î¯‡ powershell"
zsh_indicator = "ï’‰ zsh"

[os]
disabled = false
style = "bold"
format = "[$symbol]($style)  "

[os.symbols]
Alpine = "ïŒ€"
Amazon = "ï‰°"
Android = "îœژ"
Arch = "َ°£‡"
Artix = "َ°£‡"
CentOS = "ïŒ„"
Debian = "َ°£ڑ"
Fedora = "َ°£›"
Gentoo = "َ°£¨"
Linux = "َ°Œ½"
Macos = "َ°€µ"
Manjaro = "ïŒ’"
Mint = "َ°£­"
NixOS = "ïŒ“ "
Raspbian = "َ°گ؟"
Redhat = "َ±„›"
RedHatEnterprise = "َ±„›"
RockyLinux = "ïŒ«"
SUSE = "ïŒ”"
Ubuntu = "ïŒ›"
Windows = "îœڈ"

[directory]
style = "bold bright-blue"
format = "[$path]($style) "
truncation_length = 7
truncation_symbol = "â€¦/"
truncate_to_repo = false
read_only = "َ°‰گ "


[git_branch]
symbol = ""
style = "green"
format = "[$branch]($style) "

[custom.git_remote]
command = """
remote=$(git remote get-url origin 2>/dev/null);
case "$remote" in
  *github*)
    echo "ï„“"
    ;;
  *gitlab*)
    echo "ïٹ–"
    ;;
  *bitbucket*)
    echo "ï…±"
    ;;
  *)
    echo "َ°ٹ¢"
    ;;
esac
"""
shell = ["bash"]
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
style = "bold white"
format = "[$output]($style) "

[git_status]
style = "bright-yellow"
format = "[$all_status$ahead_behind]($style)"
ahead = "â†‘${count} "
behind = "â†“${count} "
diverged = "â†‘${ahead_count} â†“${behind_count} "
conflicted = "~${count} "
deleted = "âœ—${count} "
renamed = "â†’${count} "
modified = "!${count} "
staged = "âœ“${count} "
stashed = "â‰،${count} "
untracked = "?${count} "


[fill]
symbol = "آ·"
style = "dimmed bright-black"


[c]
symbol = "îک‍ "
format = " [$symbol($version)]($style)"
detect_files = ["CMakeLists.txt"]
detect_extensions = ["c", "h", "cpp", "hpp"]

[java]
symbol = "َ°¬· "
format = " [$symbol($version)]($style)"

[kotlin]
symbol = "َ±ˆ™ "
format = " [$symbol($version)]($style)"

[lua]
symbol = "َ°¢± "
format = " [$symbol($version)]($style)"

[python]
symbol = "َ°Œ  "
format = " [$symbol($version)($virtualenv)]($style)"

[rust]
symbol = "َ±ک— "
format = " [$symbol($version)]($style)"

[cmd_duration]
min_time = 1000
format = " [َ°¦– $duration]($style)"
style = "yellow"


[time]
disabled = true

[custom.clock]
command = """
icons=("" "îژ‚" "îژƒ" "îژ„" "îژ…" "îژ†" "îژ‡" "îژˆ" "îژ‰" "îژٹ" "îژ‹" "îژŒ" "îژپ")
echo "${icons[$(date +%-I)]} $(date +'%I:%M %p')"
"""
when = "true"
shell = ["bash"]
style = "dimmed bright-cyan"
format = " [$output]($style)"


[battery]
disabled = true

[custom.battery_high]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/status.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/high.sh'
shell = ["bash"]
style = "bold green"
format = " [$output]($style)"

[custom.battery_mid]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/status.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/mid.sh'
shell = ["bash"]
style = "bold yellow"
format = " [$output]($style)"

[custom.battery_low]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/status.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/low.sh'
shell = ["bash"]
style = "bold red"
format = " [$output]($style)"


[character]
success_symbol = "[ï„…](bold green)"
error_symbol = "[ï€چ](bold red)"


[custom.deepseek_balance]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/deepseek-balance.sh'
when = "grep -q deepseek.com $HOME/.claude/settings.json 2>/dev/null"
shell = ["bash"]
style = "bright-blue"
format = " [îچ° $output]($style)"

[username]
show_always = true
style_user = "bold cyan"
style_root = "bold purple"
format = " [ï€‡ $user]($style)"

[hostname]
format = " [َ°¢¹ $hostname]($style)"


[custom.docker_host]
command = 'echo "${CONTAINER_NAME:-${COMPOSE_SERVICE}}"'
when = "test -f /.dockerenv"
shell = ["bash"]
style = "bold dimmed blue"
format = " [َ°،¨ $output]($style)"


