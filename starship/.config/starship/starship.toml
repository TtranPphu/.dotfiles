# version: 1.0.0
"$schema" = "https://starship.rs/config-schema.json"

# palette = "tokio-night"
add_newline = true

format = """
$os\
$shell\
$directory\
${custom.git_remote}\
$git_branch\
$git_status\
$fill\
$c\
$java\
$kotlin\
$lua\
$python\
$rust\
$cmd_duration\
${custom.date}\
${custom.clock}\
${custom.battery_high}\
${custom.battery_mid}\
${custom.battery_low}\
$line_break\
$character\
"""

right_format = """
${custom.deepseek_balance}\
$username\
$hostname\
${custom.docker_host}\
"""


[shell]
disabled = false
style = "bold bright-black"
format = "[$indicator]($style) "
unknown_indicator = "unknown-shell"
bash_indicator = "Ņ»Ŗ bash"
cmd_indicator = "Ņ»ä cmd"
fish_indicator = "¾░ł║ fish"
nu_indicator = "Ņ¬ģ nu"
powershell_indicator = "Ņ»ć powershell"
zsh_indicator = "’Æē zsh"

[os]
disabled = false
style = "bold"
format = "[$symbol]($style)  "

[os.symbols]
Alpine = "’īĆ"
Amazon = "’ē░"
Android = "Ņ£Ä"
Arch = "¾░Żć"
Artix = "¾░Żć"
CentOS = "’īä"
Debian = "¾░ŻÜ"
Fedora = "¾░Żø"
Gentoo = "¾░Ż©"
Linux = "¾░īĮ"
Macos = "¾░ĆĄ"
Manjaro = "’īÆ"
Mint = "¾░ŻŁ"
NixOS = "’īō "
Raspbian = "¾░É┐"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
RockyLinux = "’ī½"
SUSE = "’īö"
Ubuntu = "’īø"
Windows = "Ņ£Å"

[directory]
style = "bold bright-blue"
format = "[$path]($style) "
truncation_length = 7
truncation_symbol = "ŌĆ”/"
truncate_to_repo = false
read_only = "¾░ēÉ "


[git_branch]
symbol = ""
style = "green"
format = "[$branch]($style) "

[custom.git_remote]
command = """
remote=$(git remote get-url origin 2>/dev/null);
case "$remote" in
  *github*)
    echo "’äō"
    ;;
  *gitlab*)
    echo "’Ŗ¢"
    ;;
  *bitbucket*)
    echo "’ģ▒"
    ;;
  *)
    echo "¾░Ŗó"
    ;;
esac
"""
shell = ["bash"]
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
style = "bold white"
format = "[$output]($style) "

[git_status]
style = "bright-yellow"
format = "[$all_status$ahead_behind]($style)"
ahead = "Ōåæ${count} "
behind = "Ōåō${count} "
diverged = "Ōåæ${ahead_count} Ōåō${behind_count} "
conflicted = "~${count} "
deleted = "Ō£Ś${count} "
renamed = "ŌåÆ${count} "
modified = "!${count} "
staged = "Ō£ō${count} "
stashed = "ŌēĪ${count} "
untracked = "?${count} "


[fill]
symbol = "┬Ę"
style = "dimmed bright-black"


[c]
symbol = "Ņś× "
format = " [$symbol($version)]($style)"
detect_files = ["CMakeLists.txt"]
detect_extensions = ["c", "h", "cpp", "hpp"]

[java]
symbol = "¾░¼Ę "
format = " [$symbol($version)]($style)"

[kotlin]
symbol = "¾▒łÖ "
format = " [$symbol($version)]($style)"

[lua]
symbol = "¾░ó▒ "
format = " [$symbol($version)]($style)"

[python]
symbol = "¾░īĀ "
format = " [$symbol($version)($virtualenv)]($style)"

[rust]
symbol = "¾▒śŚ "
format = " [$symbol($version)]($style)"

[cmd_duration]
min_time = 1000
format = " [¾░”¢ $duration]($style)"
style = "yellow"


[time]
disabled = true

[custom.date]
command = "date +'%y/%m/%d %a'"
when = "true"
shell = ["bash"]
style = "dimmed bright-cyan"
format = " [¾░āŁ $output]($style)"

[custom.clock]
command = """
icons=("" "ŅÄé" "ŅÄā" "ŅÄä" "ŅÄģ" "ŅÄå" "ŅÄć" "ŅÄł" "ŅÄē" "ŅÄŖ" "ŅÄŗ" "ŅÄī" "ŅÄü")
echo "${icons[$(date +%-I)]} $(date +'%I:%M %p')"
"""
when = "true"
shell = ["bash"]
style = "dimmed bright-cyan"
format = " [$output]($style)"


[battery]
disabled = true

[custom.battery_high]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/status.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/high.sh'
shell = ["bash"]
style = "bold green"
format = " [$output]($style)"

[custom.battery_mid]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/status.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/mid.sh'
shell = ["bash"]
style = "bold yellow"
format = " [$output]($style)"

[custom.battery_low]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/status.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/low.sh'
shell = ["bash"]
style = "bold red"
format = " [$output]($style)"


[character]
success_symbol = "[’äģ](bold green)"
error_symbol = "[’ĆŹ](bold red)"


[custom.deepseek_balance]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/deepseek-balance.sh'
when = "grep -q deepseek.com $HOME/.claude/settings.json 2>/dev/null"
shell = ["bash"]
style = "bright-blue"
format = " [ŅŹ░ $output]($style)"

[username]
show_always = true
style_user = "bold cyan"
style_root = "bold purple"
format = " [’Ćć $user]($style)"

[hostname]
format = " [¾░ó╣ $hostname]($style)"


[custom.docker_host]
command = 'echo "${CONTAINER_NAME:-${COMPOSE_SERVICE}}"'
when = "test -f /.dockerenv"
shell = ["bash"]
style = "bold dimmed blue"
format = " [¾░Ī© $output]($style)"


