# version: 1.0.0
"$schema" = "https://starship.rs/config-schema.json"

# palette = "tokio-night"
add_newline = true

format = """
${custom.llm_os}\
${custom.llm_pro}\
${custom.llm_flash}\
${custom.llm_reasoner}\
${custom.llm_chat}\
${custom.llm_qwen}\
${custom.llm_free}\
$shell\
${custom.compress_path}\
${custom.git_remote}\
$git_branch\
$git_status\
$fill\
$c\
$java\
$kotlin\
$lua\
$python\
$rust\
$cmd_duration\
${custom.date}\
${custom.clock}\
${custom.battery_9}\
${custom.battery_8}\
${custom.battery_7}\
${custom.battery_6}\
${custom.battery_5}\
${custom.battery_4}\
${custom.battery_3}\
${custom.battery_2}\
${custom.battery_1}\
${custom.battery_0}\
$line_break\
$character\
"""

right_format = """
${custom.deepseek_balance}\
$username\
$hostname\
${custom.docker_host}\
"""


[custom.llm_os]
command = '${STARSHIP_CONFIG%/*}/llm/route.sh os'
when = '${STARSHIP_CONFIG%/*}/llm/when.sh os'
shell = ["bash"]
style = "bold"
format = "[$output]($style)  "

[custom.llm_pro]
command = '${STARSHIP_CONFIG%/*}/llm/route.sh pro'
when = '${STARSHIP_CONFIG%/*}/llm/when.sh pro'
shell = ["bash"]
style = "red"
format = "[$output]($style)  "

[custom.llm_flash]
command = '${STARSHIP_CONFIG%/*}/llm/route.sh flash'
when = '${STARSHIP_CONFIG%/*}/llm/when.sh flash'
shell = ["bash"]
style = "purple"
format = "[$output]($style)  "

[custom.llm_reasoner]
command = '${STARSHIP_CONFIG%/*}/llm/route.sh reasoner'
when = '${STARSHIP_CONFIG%/*}/llm/when.sh reasoner'
shell = ["bash"]
style = "blue"
format = "[$output]($style)  "

[custom.llm_chat]
command = '${STARSHIP_CONFIG%/*}/llm/route.sh chat'
when = '${STARSHIP_CONFIG%/*}/llm/when.sh chat'
shell = ["bash"]
style = "cyan"
format = "[$output]($style)  "

[custom.llm_qwen]
command = '${STARSHIP_CONFIG%/*}/llm/route.sh qwen'
when = '${STARSHIP_CONFIG%/*}/llm/when.sh qwen'
shell = ["bash"]
style = "white"
format = "[$output]($style)  "

[custom.llm_free]
command = '${STARSHIP_CONFIG%/*}/llm/route.sh free'
when = '${STARSHIP_CONFIG%/*}/llm/when.sh free'
shell = ["bash"]
style = "green"
format = "[$output]($style)  "

[shell]
disabled = false
style = "bold bright-black"
format = "[$indicator]($style) "
unknown_indicator = "unknown-shell"
bash_indicator = " bash"
fish_indicator = "󰈺 fish"
nu_indicator = " nu"
zsh_indicator = " zsh"

[custom.compress_path]
command = '${STARSHIP_CONFIG%/*}/compress-path.sh'
when = "true"
shell = ["bash"]
style = "bold bright-blue"
format = "[$output]($style) "

[git_branch]
symbol = ""
style = "green"
format = "[$branch]($style) "

[custom.git_remote]
command = '${STARSHIP_CONFIG%/*}/git-remote.sh'
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
shell = ["bash"]
style = "bold white"
format = "[$output]($style) "

[git_status]
style = "bright-yellow"
format = "[$all_status$ahead_behind]($style)"
ahead = "↑${count} "
behind = "↓${count} "
diverged = "↑${ahead_count} ↓${behind_count} "
conflicted = "~${count} "
deleted = "✗${count} "
renamed = "→${count} "
modified = "!${count} "
staged = "✓${count} "
stashed = "≡${count} "
untracked = "?${count} "


[fill]
symbol = "·"
style = "dimmed bright-black"


[c]
symbol = " "
format = " [$symbol($version)]($style)"
detect_files = ["CMakeLists.txt"]
detect_extensions = ["c", "h", "cpp", "hpp"]

[java]
symbol = "󰬷 "
format = " [$symbol($version)]($style)"

[kotlin]
symbol = "󱈙 "
format = " [$symbol($version)]($style)"

[lua]
symbol = "󰢱 "
format = " [$symbol($version)]($style)"

[python]
symbol = "󰌠 "
format = " [$symbol($version)($virtualenv)]($style)"

[rust]
symbol = "󱘗 "
format = " [$symbol($version)]($style)"


[cmd_duration]
min_time = 1000
format = " [󰦖 $duration]($style)"
style = "yellow"

[time]
disabled = true

[custom.date]
command = "date '+%y-%m-%d %a'"
when = 'c=$(stty size < /dev/tty 2>/dev/null | cut -d" " -f2); [ "${c:-80}" -ge 80 ]'
shell = ["bash"]
style = "dimmed bright-cyan"
format = " [󰃭 $output]($style)"

[custom.clock]
command = """
icons=("" "" "" "" "" "" "" "" "" "" "" "" "")
echo "${icons[$(date +%-I)]} $(date +'%I:%M %p')"
"""
when = "true"
shell = ["bash"]
style = "dimmed bright-cyan"
format = " [$output]($style)"

[battery]
disabled = true

[custom.battery_9]
command = '${STARSHIP_CONFIG%/*}/battery/status.sh'
when = '${STARSHIP_CONFIG%/*}/battery/guard.sh 9'
shell = ["bash"]
style = "bold #9ece6a"
format = " [$output]($style)"

[custom.battery_8]
command = '${STARSHIP_CONFIG%/*}/battery/status.sh'
when = '${STARSHIP_CONFIG%/*}/battery/guard.sh 8'
shell = ["bash"]
style = "bold #afc66a"
format = " [$output]($style)"

[custom.battery_7]
command = '${STARSHIP_CONFIG%/*}/battery/status.sh'
when = '${STARSHIP_CONFIG%/*}/battery/guard.sh 7'
shell = ["bash"]
style = "bold #bfbf69"
format = " [$output]($style)"

[custom.battery_6]
command = '${STARSHIP_CONFIG%/*}/battery/status.sh'
when = '${STARSHIP_CONFIG%/*}/battery/guard.sh 6'
shell = ["bash"]
style = "bold #d0b769"
format = " [$output]($style)"

[custom.battery_5]
command = '${STARSHIP_CONFIG%/*}/battery/status.sh'
when = '${STARSHIP_CONFIG%/*}/battery/guard.sh 5'
shell = ["bash"]
style = "bold #e0af68"
format = " [$output]($style)"

[custom.battery_4]
command = '${STARSHIP_CONFIG%/*}/battery/status.sh'
when = '${STARSHIP_CONFIG%/*}/battery/guard.sh 4'
shell = ["bash"]
style = "bold #e5a370"
format = " [$output]($style)"

[custom.battery_3]
command = '${STARSHIP_CONFIG%/*}/battery/status.sh'
when = '${STARSHIP_CONFIG%/*}/battery/guard.sh 3'
shell = ["bash"]
style = "bold #e99877"
format = " [$output]($style)"

[custom.battery_2]
command = '${STARSHIP_CONFIG%/*}/battery/status.sh'
when = '${STARSHIP_CONFIG%/*}/battery/guard.sh 2'
shell = ["bash"]
style = "bold #ee8d7f"
format = " [$output]($style)"

[custom.battery_1]
command = '${STARSHIP_CONFIG%/*}/battery/status.sh'
when = '${STARSHIP_CONFIG%/*}/battery/guard.sh 1'
shell = ["bash"]
style = "bold #f28186"
format = " [$output]($style)"

[custom.battery_0]
command = '${STARSHIP_CONFIG%/*}/battery/status.sh'
when = '${STARSHIP_CONFIG%/*}/battery/guard.sh 0'
shell = ["bash"]
style = "bold #f7768e"
format = " [$output]($style)"


[character]
success_symbol = "[](bold green)"
error_symbol = "[](bold red)"


[custom.deepseek_balance]
command = '${STARSHIP_CONFIG%/*}/deepseek-balance.sh'
when = 'test -z "${TMUX-}${ZELLIJ-}" && grep -q deepseek.com $HOME/.claude/settings.json 2>/dev/null'
shell = ["bash"]
style = "bright-blue"
format = " [ $output]($style)"

[username]
show_always = true
style_user = "bold cyan"
style_root = "bold purple"
format = " [ $user]($style)"

[hostname]
format = " [󰢹 $hostname]($style)"


[custom.docker_host]
command = 'echo "${CONTAINER_NAME:-${COMPOSE_SERVICE}}"'
when = "test -f /.dockerenv"
shell = ["bash"]
style = "bold dimmed blue"
format = " [󰡨 $output]($style)"


