# version: 1.0.0
"$schema" = "https://starship.rs/config-schema.json"

# palette = "tokio-night"
add_newline = true

format = """
$os\
$shell\
${custom.compress_path}\
${custom.git_remote}\
$git_branch\
$git_status\
$fill\
$c\
$java\
$kotlin\
$lua\
$python\
$rust\
$cmd_duration\
${custom.date}\
${custom.clock}\
${custom.battery_high}\
${custom.battery_mid}\
${custom.battery_low}\
$line_break\
$character\
"""

right_format = """
${custom.deepseek_balance}\
$username\
$hostname\
${custom.docker_host}\
"""


[os]
disabled = false
style = "bold"
format = "[$symbol]($style)  "

[os.symbols]
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Fedora = "󰣛"
Gentoo = "󰣨"
Linux = "󰌽"
Macos = "󰀵"
Manjaro = ""
Mint = "󰣭"
NixOS = ""
Raspbian = "󰐿"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
RockyLinux = ""
SUSE = ""
Ubuntu = ""

[shell]
disabled = false
style = "bold bright-black"
format = "[$indicator]($style) "
unknown_indicator = "unknown-shell"
bash_indicator = " bash"
fish_indicator = "󰈺 fish"
nu_indicator = " nu"
zsh_indicator = " zsh"

[custom.compress_path]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/compress-path.sh'
when = "true"
shell = ["bash"]
style = "bold bright-blue"
format = "[$output]($style) "

[git_branch]
symbol = ""
style = "green"
format = "[$branch]($style) "

[custom.git_remote]
command = """
remote=$(git remote get-url origin 2>/dev/null);
case "$remote" in
  *github*)
    echo ""
    ;;
  *gitlab*)
    echo ""
    ;;
  *bitbucket*)
    echo ""
    ;;
  *)
    echo "󰊢"
    ;;
esac
"""
shell = ["bash"]
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
style = "bold white"
format = "[$output]($style) "

[git_status]
style = "bright-yellow"
format = "[$all_status$ahead_behind]($style)"
ahead = "↑${count} "
behind = "↓${count} "
diverged = "↑${ahead_count} ↓${behind_count} "
conflicted = "~${count} "
deleted = "✗${count} "
renamed = "→${count} "
modified = "!${count} "
staged = "✓${count} "
stashed = "≡${count} "
untracked = "?${count} "


[fill]
symbol = "·"
style = "dimmed bright-black"


[c]
symbol = " "
format = " [$symbol($version)]($style)"
detect_files = ["CMakeLists.txt"]
detect_extensions = ["c", "h", "cpp", "hpp"]

[java]
symbol = "󰬷 "
format = " [$symbol($version)]($style)"

[kotlin]
symbol = "󱈙 "
format = " [$symbol($version)]($style)"

[lua]
symbol = "󰢱 "
format = " [$symbol($version)]($style)"

[python]
symbol = "󰌠 "
format = " [$symbol($version)($virtualenv)]($style)"

[rust]
symbol = "󱘗 "
format = " [$symbol($version)]($style)"


[cmd_duration]
min_time = 1000
format = " [󰦖 $duration]($style)"
style = "yellow"

[time]
disabled = true

[custom.date]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/compress-date.sh'
when = "true"
shell = ["bash"]
style = "dimmed bright-cyan"
format = " [󰃭 $output]($style)"

[custom.clock]
command = """
icons=("" "" "" "" "" "" "" "" "" "" "" "" "")
echo "${icons[$(date +%-I)]} $(date +'%I:%M %p')"
"""
when = "true"
shell = ["bash"]
style = "dimmed bright-cyan"
format = " [$output]($style)"

[battery]
disabled = true

[custom.battery_high]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/status.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/high.sh'
shell = ["bash"]
style = "bold green"
format = " [$output]($style)"

[custom.battery_mid]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/status.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/mid.sh'
shell = ["bash"]
style = "bold yellow"
format = " [$output]($style)"

[custom.battery_low]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/status.sh'
when = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/battery/low.sh'
shell = ["bash"]
style = "bold red"
format = " [$output]($style)"


[character]
success_symbol = "[](bold green)"
error_symbol = "[](bold red)"


[custom.deepseek_balance]
command = 'config_dir="${STARSHIP_CONFIG%/*}"; ${config_dir:-$HOME/.config/starship}/deepseek-balance.sh'
when = 'test -z "${TMUX-}${ZELLIJ-}" && grep -q deepseek.com $HOME/.claude/settings.json 2>/dev/null'
shell = ["bash"]
style = "bright-blue"
format = " [ $output]($style)"

[username]
show_always = true
style_user = "bold cyan"
style_root = "bold purple"
format = " [ $user]($style)"

[hostname]
format = " [󰢹 $hostname]($style)"


[custom.docker_host]
command = 'echo "${CONTAINER_NAME:-${COMPOSE_SERVICE}}"'
when = "test -f /.dockerenv"
shell = ["bash"]
style = "bold dimmed blue"
format = " [󰡨 $output]($style)"


