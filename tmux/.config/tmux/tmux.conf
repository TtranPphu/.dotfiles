# Prefix
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# Reload config
bind q source-file ~/.config/tmux/tmux.conf \; display "󱑠 Configuration reloaded"

# Vi mode for copy
setw -g mode-keys vi
bind e copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane Controls
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x kill-pane

bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Right resize-pane -R 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Down resize-pane -D 5

bind -n C-M-h select-pane -L
bind -n C-M-j select-pane -D
bind -n C-M-k select-pane -U
bind -n C-M-l select-pane -R

bind -n C-M-S-h resize-pane -L 5
bind -n C-M-S-j resize-pane -D 5
bind -n C-M-S-k resize-pane -U 5
bind -n C-M-S-l resize-pane -R 5

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

bind -n M-h select-window -t -1
bind -n M-l select-window -t +1
bind -n M-H swap-window -t -1 \; select-window -t -1
bind -n M-L swap-window -t +1 \; select-window -t +1

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

bind -n M-j switch-client -n
bind -n M-k switch-client -p

# Applications
bind D run-shell -b '~/.config/tmux/scripts/auto-split lazydocker'
bind E run-shell -b '~/.config/tmux/scripts/auto-split nvim'
bind F run-shell -b '~/.config/tmux/scripts/auto-split yazi'
bind G run-shell -b '~/.config/tmux/scripts/auto-split lazygit'
bind S run-shell -b '~/.config/tmux/scripts/auto-split'
bind T run-shell -b '~/.config/tmux/scripts/auto-split btop'
bind U run-shell -b '~/.config/tmux/scripts/auto-split gdu'

# General
set -g default-shell /usr/bin/zsh
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse off
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 100
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off
set -g extended-keys on
%if #{>=:#{version},3.5}
set -g extended-keys-format csi-u
%endif
set -sg escape-time 10

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g @resurrect-capture-pane-contents 'on'

# Pane logging
set-hook -g after-new-session "run-shell -b '~/.config/tmux/scripts/pane-log attach #{q:socket_path} #{q:pane_id}'"
set-hook -g after-new-window "run-shell -b '~/.config/tmux/scripts/pane-log attach #{q:socket_path} #{q:pane_id}'"
set-hook -g after-split-window "run-shell -b '~/.config/tmux/scripts/pane-log attach #{q:socket_path} #{q:pane_id}'"
set-hook -g after-kill-pane "run-shell -b '~/.config/tmux/scripts/pane-log cleanup #{q:pane_id}'"
set-hook -g pane-exited "run-shell -b '~/.config/tmux/scripts/pane-log cleanup #{q:pane_id}'"
run-shell -b '~/.config/tmux/scripts/pane-log init #{q:socket_path}'

# Status bar
set -g status-position top
set -g status 3
set -g status-interval 5
set -g status-justify centre
set -g status-left-length 30
set -g status-right-length 60
set -g window-status-separator ""
run-shell '~/.config/tmux/scripts/status-hint init #{q:socket_path}'
set -g status-format[1] '#{?client_prefix,#{E:@status-hint-prefix-1},#(~/.config/tmux/scripts/status-hint 1 #{q:pane_mode})}'
set -g status-format[2] '#{?client_prefix,#{E:@status-hint-prefix-2},#(~/.config/tmux/scripts/status-hint 2 #{q:pane_mode})}'
set -gw automatic-rename on
set -gw automatic-rename-format '#(~/.config/tmux/scripts/window-info #{q:pane_tty} #{q:pane_current_command})  #{b:pane_current_path}'

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#(~/.config/tmux/scripts/status-left #{q:socket_path} #{q:session_name})"
set -g status-right "#(~/.config/tmux/scripts/status-right #{q:socket_path} #{q:session_name} #{q:pane_id} #{q:pane_mode} #{q:client_prefix} #{q:window_zoomed_flag} #{q:host})"
set -g window-status-format "#[fg=brightblack]  #I #W "
set -g window-status-current-format "#[fg=blue,bg=brightblack,bold]  #I #W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue
run-shell '~/.config/tmux/scripts/tpm-bootstrap'
