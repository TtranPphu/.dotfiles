# Prefix
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# Reload config
bind q source-file ~/.config/tmux/tmux.conf \; display "Configuration reloaded"

# Vi mode for copy
setw -g mode-keys vi
bind e copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane Controls
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x kill-pane

bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 100
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off
set -g extended-keys on
set -g extended-keys-format csi-u
set -sg escape-time 10

# Status bar
set -g status-position top
set -g status 3
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -g status-format[1] '#{?#{==:#{pane_mode},copy-mode},#[fg=blue]h/j/k/l#[fg=brightblack]: move  #[fg=blue]Space/v#[fg=brightblack]: select  #[fg=blue]Esc#[fg=brightblack]: clear  #[fg=blue]q#[fg=brightblack]: quit,#{?#{==:#{pane_mode},tree-mode},#[fg=blue]Up/Down#[fg=brightblack]: move  #[fg=blue]Enter#[fg=brightblack]: choose  #[fg=blue]+/-#[fg=brightblack]: expand/collapse  #[fg=blue]v#[fg=brightblack]: preview  #[fg=blue]q#[fg=brightblack]: quit,#{?#{==:#{client_key_table},prefix},#[fg=blue]h#[fg=brightblack]:   #[fg=blue]x#[fg=brightblack]: kill   #[fg=blue]c#[fg=brightblack]: new   #[fg=blue]r#[fg=brightblack]: rename   #[fg=blue]k#[fg=brightblack]: kill   #[fg=blue]n/p#[fg=brightblack]: next/prev   #[fg=blue]d#[fg=brightblack]: detach  #[fg=blue]w#[fg=brightblack]: tree,}}}'
set -g status-format[2] '#{?#{==:#{pane_mode},copy-mode},#[fg=blue]C-u/C-d#[fg=brightblack]: half page  #[fg=blue]Enter/y#[fg=brightblack]: copy  #[fg=blue]/ ?#[fg=brightblack]: search,#{?#{==:#{pane_mode},tree-mode},#[fg=blue]x/X#[fg=brightblack]: kill one/tagged  #[fg=blue]t/T#[fg=brightblack]: tag/clear  #[fg=blue]C-t#[fg=brightblack]: tag all  #[fg=blue]C-s/n#[fg=brightblack]: search/repeat,#{?#{==:#{client_key_table},prefix},#[fg=blue]v#[fg=brightblack]:   #[fg=blue]z#[fg=brightblack]: zoom   #[fg=blue]C#[fg=brightblack]: new   #[fg=blue]R#[fg=brightblack]: rename   #[fg=blue]K#[fg=brightblack]: kill   #[fg=blue]N/P#[fg=brightblack]: next/prev   #[fg=blue]q#[fg=brightblack]: reload  #[fg=blue]e#[fg=brightblack]: copy,}}}'
set -gw automatic-rename on
set -gw automatic-rename-format '#(~/.config/tmux/scripts/window-info #{q:pane_tty} #{q:pane_current_command})  #{b:pane_current_path}'

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#(~/.config/tmux/scripts/status-left #{q:socket_path} #{q:session_name})"
set -g status-right "#(~/.config/tmux/scripts/status-right #{q:socket_path} #{q:session_name} #{q:pane_mode} #{q:client_prefix} #{q:window_zoomed_flag} #{q:host})"
set -g window-status-format "#[fg=brightblack]  #I #W "
set -g window-status-current-format "#[fg=blue,bg=brightblack,bold]  #I #W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue
