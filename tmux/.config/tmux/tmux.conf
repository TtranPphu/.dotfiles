# Prefix
set -g prefix C-space
bind C-space send-prefix

# Back-up prefix
set -g prefix2 C-a
bind C-a send-prefix -2

unbind space

# Reload config
bind q source-file ~/.config/tmux/tmux.conf \; display "󱑠 Configuration reloaded"

# General
set -g default-shell /usr/bin/zsh
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse off
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 100
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
setw -g aggressive-resize on
set -g detach-on-destroy off
set -g extended-keys on
%if #{>=:#{version},3.5}
set -g extended-keys-format csi-u
%endif
set -sg escape-time 10

# Pane logging
set-hook -g after-new-session "run-shell -b '~/.config/tmux/scripts/pane-log.sh attach #{q:socket_path} #{q:pane_id}'"
set-hook -g after-new-window "run-shell -b '~/.config/tmux/scripts/pane-log.sh attach #{q:socket_path} #{q:pane_id}'"
set-hook -g after-split-window "run-shell -b '~/.config/tmux/scripts/pane-log.sh attach #{q:socket_path} #{q:pane_id}' \; run-shell -b '~/.config/tmux/scripts/rebalance-layout.sh #{q:hook_window}'"
set-hook -g after-kill-pane "run-shell -b '~/.config/tmux/scripts/pane-log.sh cleanup #{q:pane_id}' \; run-shell -b '~/.config/tmux/scripts/rebalance-layout.sh #{q:hook_window}'"
set-hook -g pane-exited "run-shell -b '~/.config/tmux/scripts/pane-log.sh cleanup #{q:pane_id}' \; run-shell -b '~/.config/tmux/scripts/rebalance-layout.sh #{q:hook_window}'"
run-shell -b '~/.config/tmux/scripts/pane-log.sh init #{q:socket_path}'

# Source modular configs
source-file ~/.config/tmux/bindings.conf
source-file ~/.config/tmux/theme.conf
