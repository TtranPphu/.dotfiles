# Vi mode for copy
setw -g mode-keys vi
bind e copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# PgUp/PgDn for half-page scroll (replace C-u/C-d)
unbind -T copy-mode-vi C-u
unbind -T copy-mode-vi C-d
bind -T copy-mode-vi PageUp send -X halfpage-up
bind -T copy-mode-vi PageDown send -X halfpage-down

# Home/End for first/last non-space char
bind -T copy-mode-vi Home send -X back-to-indentation
bind -T copy-mode-vi End send -X end-of-line

# Pane Controls
# Leave h/v unbound after prefix so auto-split app shortcuts own those keys.
# This also prevents tmux defaults or plugins from reintroducing pane splits here.
unbind h
unbind v
bind x kill-pane
bind z resize-pane -Z

bind -n C-M-h select-pane -L
bind -n C-M-j select-pane -D
bind -n C-M-k select-pane -U
bind -n C-M-l select-pane -R

bind -n C-M-w select-pane -U
bind -n C-M-a select-pane -L
bind -n C-M-s select-pane -D
bind -n C-M-d select-pane -R

bind -n C-M-Left display-message "Use Ctrl-Meta(Alt)-h/j/k/l (w/a/s/d) for pane navigation"
bind -n C-M-Right display-message "Use Ctrl-Meta(Alt)-h/j/k/l (w/a/s/d) for pane navigation"
bind -n C-M-Up display-message "Use Ctrl-Meta(Alt)-h/j/k/l (w/a/s/d) for pane navigation"
bind -n C-M-Down display-message "Use Ctrl-Meta(Alt)-h/j/k/l (w/a/s/d) for pane navigation"

bind -n C-M-S-h resize-pane -L 5
bind -n C-M-S-j resize-pane -D 5
bind -n C-M-S-k resize-pane -U 5
bind -n C-M-S-l resize-pane -R 5

bind -n C-M-S-w resize-pane -U 5
bind -n C-M-S-a resize-pane -L 5
bind -n C-M-S-s resize-pane -D 5
bind -n C-M-S-d resize-pane -R 5

bind -n C-M-S-Left display-message "Use Ctrl-Meta(Alt)-Shift-h/j/k/l (w/a/s/d) for pane resize"
bind -n C-M-S-Right display-message "Use Ctrl-Meta(Alt)-Shift-h/j/k/l (w/a/s/d) for pane resize"
bind -n C-M-S-Up display-message "Use Ctrl-Meta(Alt)-Shift-h/j/k/l (w/a/s/d) for pane resize"
bind -n C-M-S-Down display-message "Use Ctrl-Meta(Alt)-Shift-h/j/k/l (w/a/s/d) for pane resize"

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c run-shell -b 'tmux new-window -c "#{pane_current_path}" "$(~/.config/tmux/scripts/current-shell.sh)"'
bind k kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-h select-window -t -1
bind -n M-l select-window -t +1
bind -n M-a select-window -t -1
bind -n M-d select-window -t +1
bind -n M-Left display-message "Use Meta(Alt)-h/l (a/d) for window navigation"
bind -n M-Right display-message "Use Meta(Alt)-h/l (a/d) for window navigation"

bind -n M-H swap-window -t -1 \; select-window -t -1
bind -n M-L swap-window -t +1 \; select-window -t +1
bind -n M-A swap-window -t -1 \; select-window -t -1
bind -n M-D swap-window -t +1 \; select-window -t +1
bind -n M-S-Left display-message "Use Meta(Alt)-Shift-h/l (a/d) for swap window"
bind -n M-S-Right display-message "Use Meta(Alt)-Shift-h/l (a/d) for swap window"

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session
bind K kill-session
unbind n
unbind p

bind -n M-j switch-client -n
bind -n M-k switch-client -p
bind -n M-s switch-client -n
bind -n M-w switch-client -p
bind -n M-m run-shell -b '~/.config/tmux/scripts/auto-session.sh'
bind -n M-e run-shell -b '~/.config/tmux/scripts/session-picker.sh'
bind -n M-p run-shell -b '~/.config/tmux/scripts/session-picker.sh'
bind -n M-Up display-message "Use Meta(Alt)-j/k (w/s) for session navigation"
bind -n M-Down display-message "Use Meta(Alt)-j/k (w/s) for session navigation"

# Applications
bind S run-shell -b '~/.config/tmux/scripts/auto-split.sh'

# bind A run-shell -b '~/.config/tmux/scripts/auto-split.sh aichat'
# bind D run-shell -b '~/.config/tmux/scripts/auto-split.sh lazydocker'
# bind E run-shell -b '~/.config/tmux/scripts/auto-split.sh nvim'
bind F run-shell -b '~/.config/tmux/scripts/auto-split.sh yazi'
# bind G run-shell -b '~/.config/tmux/scripts/auto-split.sh lazygit'
# bind T run-shell -b '~/.config/tmux/scripts/auto-split.sh btop'
# bind U run-shell -b '~/.config/tmux/scripts/auto-split.sh gdu'

#Pop-up
bind ` run-shell -b 'tmux display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "$(~/.config/tmux/scripts/current-shell.sh)"'

bind D display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "lazydocker"
bind E display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "nvim"
# bind F display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "yazi"
bind G display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "lazygit"
bind T display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "btop"
bind U display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "gdu"
